<!DOCTYPE html>
<html>

<head>

<title>AI API Threat Detection SOC Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

h1{
text-align:center;
padding:20px;
}

.metrics{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:center;
}

</style>

</head>

<body>

<h1>AI API Threat Detection SOC Dashboard</h1>

<div class="metrics">

<div class="card">
<h3>Total Requests</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Malicious</h3>
<p id="malicious">0</p>
</div>

<div class="card">
<h3>Normal</h3>
<p id="normal">0</p>
</div>

</div>

<div class="container">

<div class="panel">

<h3>🔥 Live Attack Types</h3>

<canvas id="attackChart"></canvas>

</div>

<div class="panel">

<h3>Behavior Intelligence</h3>

<table>

<thead>
<tr>
<th>IP</th>
<th>Requests</th>
<th>Endpoint Div</th>
<th>User Agent Div</th>
<th>Geo Div</th>
<th>Avg Interval</th>
</tr>
</thead>

<tbody id="behavior"></tbody>

</table>

</div>

</div>


<div class="panel" style="margin:20px;">

<h3>Attack Timeline</h3>

<table>

<thead>
<tr>
<th>Time</th>
<th>IP</th>
<th>Endpoint</th>
<th>Geo</th>
<th>User Agent</th>
<th>Threat Score</th>
<th>Status</th>
<th>🔥 Attack Type</th>
</tr>
</thead>

<tbody id="logs"></tbody>

</table>

</div>


<script>

let attackChart;

async function loadMetrics(){

let res=await fetch("/metrics")
let data=await res.json()

document.getElementById("total").innerText=data.total_requests
document.getElementById("malicious").innerText=data.malicious_requests
document.getElementById("normal").innerText=data.normal_requests

}

async function loadAttackTypes(){

let res = await fetch("/logs")
let data = await res.json()

let counts = {}

data.forEach(log => {
    let type = log.attack_type || "Normal"

    if(counts[type]){
        counts[type]++
    }else{
        counts[type] = 1
    }
})

let labels = Object.keys(counts)
let values = Object.values(counts)

if(!attackChart){

attackChart = new Chart(
document.getElementById("attackChart"),
{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Attack Types",
data:values,
backgroundColor:[
"#ef4444","#f97316","#eab308","#22c55e","#3b82f6","#a855f7"
]
}]
}
})

}else{

attackChart.data.labels = labels
attackChart.data.datasets[0].data = values
attackChart.update()

}
}

async function loadBehavior(){

let res=await fetch("/behavior")
let data=await res.json()

let table=document.getElementById("behavior")

table.innerHTML=""

data.forEach(ip=>{

let row=`<tr>

<td>${ip.ip}</td>
<td>${ip.request_count}</td>
<td>${ip.endpoint_diversity}</td>
<td>${ip.agent_diversity}</td>
<td>${ip.geo_diversity}</td>
<td>${ip.avg_interval}</td>

</tr>`

table.innerHTML+=row

})

}

async function loadLogs(){

let res=await fetch("/logs")
let data=await res.json()

let table=document.getElementById("logs")

table.innerHTML=""

data.reverse().forEach(log=>{

let color="white"

if(log.status==="MALICIOUS"){
color="#ef4444"
}

let attackType = log.attack_type ? log.attack_type : "Normal";

let row=`<tr style="color:${color}">

<td>${log.time || ""}</td>
<td>${log.ip || ""}</td>
<td>${log.endpoint || ""}</td>
<td>${log.geo || ""}</td>
<td>${log.agent || ""}</td>
<td>${log.score || ""}</td>
<td>${log.status || ""}</td>
<td>${attackType}</td>

</tr>`

table.innerHTML+=row

})

}

setInterval(()=>{

loadMetrics()
loadAttackTypes()
loadBehavior()
loadLogs()

},1500)

</script>

</body>
</html>
